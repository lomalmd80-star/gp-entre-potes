<rect x="16" y="23" width="28" height="4" rx="2" fill="rgba(100,200,255,.15)"/>

<path d="M15 44 Q15 36 22 36 L38 36 Q45 36 45 44 L48 64 Q48 70 42 70 L18 70 Q12 70 12 64 Z" fill="${r.sc}" opacity=".85"/>
<rect x="20" y="40" width="20" height="3" rx="1" fill="rgba(255,255,255,.1)"/>
<line x1="30" y1="36" x2="30" y2="65" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
</svg>`;
}

function pAv(r,c){
  const sz=c==='pav'?42:c==='pavS'?30:22;
  return `<div style="width:${sz}px;margin:0 auto 3px">${riderSVG(r,sz)}</div>`;
}

function hashPw(pw){var h=0;for(var i=0;i<pw.length;i++){h=((h<<5)-h)+pw.charCodeAt(i);h|=0}return Math.abs(h).toString(36)}

function doLogin(){
  var nm=(document.getElementById("iNm").value||"").trim();
  var pw=document.getElementById("iPw").value||"";
  var err=document.getElementById("loginErr");
  err.style.display="none";
  if(!nm){err.style.display="block";err.textContent="Entre ton pseudo";return}
  if(!pw){err.style.display="block";err.textContent="Entre ton mot de passe";return}
  var existing=S.p.find(function(p){return p.nm.toLowerCase()===nm.toLowerCase()});
  if(!existing){err.style.display="block";err.textContent="❌ Pseudo inconnu — inscris-toi d'abord";return}
  var pwHash=hashPw(pw);
  if(existing.pwHash&&existing.pwHash!==pwHash){err.style.display="block";err.textContent="❌ Mot de passe incorrect";return}
  if(!existing.pwHash)existing.pwHash=pwHash;
  S.u=existing.ph;sv();nav("home");
}

function doRegister(){
  var nm=(document.getElementById("iNmR").value||"").trim();
  var pw=document.getElementById("iPwR").value||"";
  var pw2=document.getElementById("iPwR2").value||"";
  var err=document.getElementById("regErr");
  err.style.display="none";
  if(!nm||nm.length<2){err.style.display="block";err.textContent="Pseudo trop court (2 caractères min)";return}
  if(!pw||pw.length<3){err.style.display="block";err.textContent="Mot de passe trop court (3 caractères min)";return}
  if(pw!==pw2){err.style.display="block";err.textContent="❌ Les mots de passe ne correspondent pas";return}
  var existing=S.p.find(function(p){return p.nm.toLowerCase()===nm.toLowerCase()});
  if(existing){err.style.display="block";err.textContent="❌ Ce pseudo est déjà pris, choisis-en un autre";return}
  var ph="u_"+nm.toLowerCase().replace(/[^a-z0-9]/g,"")+"_"+Date.now().toString(36);
  var pwHash=hashPw(pw);
  S.p.push({ph:ph,nm:nm,pwHash:pwHash,tp:0,xp:0,jk:2,pk:[],sc:{},qd:[],av:"🏍️",fav:null,favTeam:null,favCircuit:null});
  S.u=ph;sv();nav("profile");
}

        var pole=POLE_TIMES[gpId];

        var diff=Math.abs(toSec(pred)-toSec(pole));
        S.mg[scoreKey]=diff;

function listenFirebase(){

    var data=snap.val();
    if(!data)return;
    var updated=false;
    Object.keys(data).forEach(function(key){
      var idx=parseInt(key);
      if(isNaN(idx)||!live.sessData[idx])return;
      var sessData=data[key];
      if(sessData.res&&sessData.res.length>0&&!live.sessData[idx].res){
        live.sessData[idx].res=sessData.res;
        if(sessData.weather)live.sessData[idx].weather=sessData.weather;
        if(sessData.notes)live.sessData[idx].notes=sessData.notes;
        updated=true;
        console.log("🔥 Firebase: "+live.sessData[idx].name+" mis à jour ("+sessData.res.length+" pilotes)");
      }
    });
    if(updated)ren();
  });
  
  // Listen to live feed updates
  db.ref("gp/"+live.id+"/feed").on("value",function(snap){
    var data=snap.val();
    if(data&&Array.isArray(data)){
      liveFeed=data;
      if(vw==='live')rLive();
    }
  });
  
  // Listen to shared chat
  db.ref("chat").on("value",function(snap){
    var data=snap.val();
    if(data){S.ch=Object.values(data);if(vw==='chat')rCh(me())}

  // Listen to all players (multi-device sync)

    var data=snap.val();
    if(data){S.p=Object.values(data);sv();if(vw==='standings'||vw==='home')ren()}
  });
}

// ── ANTHROPIC API: Recherche automatique des résultats ──
var lastFetch=0;
var fetchInterval=180000; // 3 minutes
var isFetching=false;

async function fetchLiveResults(){
  var live=G.find(function(g){return g.st==="live"});
  if(!live||!live.sessData)return;
  if(isFetching)return;
  
  var now=new Date();
  var needsUpdate=false;
  live.sessData.forEach(function(s){
    var end=new Date(s.end);
    if(now>=end&&!s.res)needsUpdate=true;
  });
  if(!needsUpdate)return;
  
  isFetching=true;
  var el=document.getElementById('fetch-status');
  if(el)el.innerHTML='<span style="color:var(--yel);font-size:8px;animation:pulse 1s infinite">🔄 Recherche résultats...</span>';
  
  try{
    var sessInfo=live.sessData.map(function(s,i){
      var end=new Date(s.end);
      return s.name+"(idx:"+i+","+(now>=end?(s.res?"has_data":"NEED"):"upcoming")+")";
    }).join(", ");
    
    var prompt="Give me the latest confirmed MotoGP results from the 2026 Brazilian GP at Goiania (March 20-22 2026). "
    +"Sessions status: "+sessInfo+". "
    +"For each session marked NEED, give full classification with lap times. "
    +"Reply ONLY with valid JSON, no markdown: "
    +'{"sessions":[{"idx":2,"name":"FP2","results":[{"rider":"Marquez","time":"1:18.234"},{"rider":"Martin","time":"1:18.301"}]},{"idx":3,"name":"Q1","results":[...]}]}';
    
    var resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:3000,
        messages:[{role:"user",content:prompt}],
        tools:[{type:"web_search_20250305",name:"web_search"}]
      })
    });
    
    var data=await resp.json();
    if(!data||!data.content)throw new Error("No content");
    
    var fullText=data.content.map(function(item){return item.type==="text"?item.text:""}).filter(Boolean).join("\n");
    var clean=fullText.replace(/```json|```/g,"").trim();
    var j1=clean.indexOf("{"),j2=clean.lastIndexOf("}")+1;
    if(j1<0)throw new Error("No JSON");
    var parsed=JSON.parse(clean.substring(j1,j2));
    if(!parsed.sessions)throw new Error("No sessions");
    
    var updated=false;
    parsed.sessions.forEach(function(sess){
      if(!sess.results||!sess.results.length)return;
      var idx=sess.idx;
      if(idx===undefined||!live.sessData[idx]||live.sessData[idx].res)return;
      
      var newRes=[];
      sess.results.forEach(function(r){
        var name=(r.rider||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
        var rd=R.find(function(x){
          var xn=x.n.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
          return xn.indexOf(name)>=0||name.indexOf(xn.split(" ").pop())>=0;
        });
        if(rd)newRes.push({rid:rd.id,t:r.time||""});
      });
      
      if(newRes.length>=3){
        live.sessData[idx].res=newRes;
        updated=true;
        // Push to Firebase so all users see it
        if(firebaseReady&&db){
          db.ref("gp/"+live.id+"/sessions/"+idx).set({res:newRes,updated:Date.now()});
        }
        console.log("✅ "+sess.name+": "+newRes.length+" résultats");
      }
    });
    
    if(updated){
      if(el)el.innerHTML='<span style="color:var(--grn);font-size:8px">✅ Résultats mis à jour!</span>';
      ren();
    }else{
      if(el)el.innerHTML='<span style="color:var(--t3);font-size:8px">Pas de nouveaux résultats</span>';
    }
  }catch(err){
    console.log("Fetch error:",err);
    if(el)el.innerHTML='<span style="color:var(--t3);font-size:8px">⏳ Réessai dans 3min</span>';
  }
  isFetching=false;
  lastFetch=Date.now();
}

var colors=['#e10600','#ffd700','#00c853','#2979ff','#ff6600','#7c3aed'];
var container=document.getElementById('particles');
if(!container)return;

function spawn(){
  var div=document.createElement('div');
  div.className='particle beam';
  var svg=motoSVGs[Math.floor(Math.random()*motoSVGs.length)];
  var color=colors[Math.floor(Math.random()*colors.length)];
  var size=Math.random()*20+15;
  var left=Math.random()*96+2;
  var duration=Math.random()*10+7;
  var rotation=Math.random()*360;
  var rotSpeed=Math.random()*720-360;
  
  svg=svg.replace(/W/g,String(Math.round(size))).replace(/C/g,color);
  div.innerHTML=svg;
  div.style.cssText='left:'+left+'%;bottom:-50px;animation-duration:'+duration+'s;filter:drop-shadow(0 0 6px '+color+'80);transform:rotate('+rotation+'deg);opacity:0';
  container.appendChild(div);
  
  // Add rotation during float
  var start=Date.now();
  var rotInterval=setInterval(function(){
    var elapsed=(Date.now()-start)/1000;
    if(elapsed>duration){clearInterval(rotInterval);return}
    div.style.transform='rotate('+(rotation+elapsed*rotSpeed/duration)+'deg)';
  },50);
  
  setTimeout(function(){clearInterval(rotInterval);try{container.removeChild(div)}catch(e){}},duration*1000+500);
}
