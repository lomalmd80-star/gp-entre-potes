<rect x="14" y="22" width="32" height="6" rx="3" fill="rgba(0,0,0,.55)"/>
<rect x="16" y="23" width="28" height="4" rx="2" fill="rgba(100,200,255,.15)"/>
<text x="30" y="18" text-anchor="middle" fill="#fff" font-family="'Roboto Condensed',sans-serif" font-weight="900" font-size="13" opacity=".9">${r.nm}</text>
<path d="M15 44 Q15 36 22 36 L38 36 Q45 36 45 44 L48 64 Q48 70 42 70 L18 70 Q12 70 12 64 Z" fill="${r.sc}" opacity=".85"/>
<rect x="20" y="40" width="20" height="3" rx="1" fill="rgba(255,255,255,.1)"/>
<line x1="30" y1="36" x2="30" y2="65" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
</svg>`;
}

function pAv(r,c){
  const sz=c==='pav'?42:c==='pavS'?30:22;
  return `<div style="width:${sz}px;margin:0 auto 3px">${riderSVG(r,sz)}</div>`;
}

function mkM(){
  if(actx)stM();
  actx=new(window.AudioContext||window.webkitAudioContext)();
  var tk=TRACKS[mTk%TRACKS.length];
  var masterG=actx.createGain();masterG.gain.value=0.12;masterG.connect(actx.destination);
  
  // Reverb (simple delay)
  var delay=actx.createDelay();delay.delayTime.value=0.15;
  var fbGain=actx.createGain();fbGain.gain.value=0.2;
  delay.connect(fbGain);fbGain.connect(delay);
  var wetGain=actx.createGain();wetGain.gain.value=tk.lofi?0.3:0.15;
  delay.connect(wetGain);wetGain.connect(masterG);
  
  // Lo-fi filter
  var lpf=actx.createBiquadFilter();lpf.type='lowpass';lpf.frequency.value=tk.lofi?2500:8000;lpf.Q.value=0.5;
  lpf.connect(masterG);lpf.connect(delay);
  
  var beat=60/tk.bpm;
  var barLen=beat*4;
  
  function playBar(startTime,chordIdx){
    var chord=tk.chords[chordIdx%tk.chords.length];
    var bassNote=tk.bass[chordIdx%tk.bass.length];
    
    // ═══ CHORDS (pad) ═══
    chord.forEach(function(freq){
      var osc=actx.createOscillator();
      var g=actx.createGain();
      osc.type=tk.lofi?'triangle':'sine';
      osc.frequency.value=freq;
      // Slight detune for warmth
      osc.detune.value=Math.random()*6-3;
      g.gain.setValueAtTime(0,startTime);
      g.gain.linearRampToValueAtTime(tk.name==='Ambient Chill'?0.04:0.025,startTime+beat*0.5);
      g.gain.setValueAtTime(tk.name==='Ambient Chill'?0.04:0.025,startTime+barLen-beat*0.5);
      g.gain.linearRampToValueAtTime(0,startTime+barLen);
      osc.connect(g);g.connect(lpf);
      osc.start(startTime);osc.stop(startTime+barLen+0.1);
    });
    
    // ═══ BASS ═══
    var bOsc=actx.createOscillator();var bG=actx.createGain();
    bOsc.type=tk.name==='Drum & Bass'?'sawtooth':'sine';
    bOsc.frequency.value=bassNote;
    var bFilt=actx.createBiquadFilter();bFilt.type='lowpass';bFilt.frequency.value=300;
    bG.gain.setValueAtTime(0,startTime);
    // Bass pattern
    for(var b=0;b<4;b++){
      var bt=startTime+b*beat;
      if(tk.name==='Funk Groove'&&b%2===1){
        bG.gain.setValueAtTime(0.06,bt);
        bG.gain.exponentialRampToValueAtTime(0.001,bt+beat*0.3);
        bG.gain.setValueAtTime(0.06,bt+beat*0.5);
        bG.gain.exponentialRampToValueAtTime(0.001,bt+beat*0.8);
      } else if(tk.name==='Reggae Vibes'){
        bG.gain.setValueAtTime(0,bt);
        bG.gain.setValueAtTime(0.07,bt+beat*0.5);
        bG.gain.exponentialRampToValueAtTime(0.001,bt+beat);
      } else {
        bG.gain.setValueAtTime(0.06,bt);
        bG.gain.exponentialRampToValueAtTime(0.001,bt+beat*0.8);
      }
    }
    bOsc.connect(bFilt);bFilt.connect(bG);bG.connect(masterG);
    bOsc.start(startTime);bOsc.stop(startTime+barLen+0.1);
    
    // ═══ DRUMS ═══
    if(tk.drum){
      for(var d=0;d<4;d++){
        var dt=startTime+d*beat;
        // Kick on 1 and 3 (or every beat for D&B)
        if(d===0||d===2||(tk.name==='Drum & Bass')){
          var kOsc=actx.createOscillator();var kG=actx.createGain();
          kOsc.type='sine';kOsc.frequency.setValueAtTime(150,dt);
          kOsc.frequency.exponentialRampToValueAtTime(40,dt+0.12);
          kG.gain.setValueAtTime(0.12,dt);
          kG.gain.exponentialRampToValueAtTime(0.001,dt+0.15);
          kOsc.connect(kG);kG.connect(masterG);
          kOsc.start(dt);kOsc.stop(dt+0.2);
        }
        // Snare on 2 and 4
        if(d===1||d===3){
          var sLen=512;var sBuf=actx.createBuffer(1,sLen,actx.sampleRate);
          var sData=sBuf.getChannelData(0);
          for(var si=0;si<sLen;si++)sData[si]=(Math.random()*2-1)*Math.pow(1-si/sLen,3);
          var sSrc=actx.createBufferSource();sSrc.buffer=sBuf;
          var sG2=actx.createGain();sG2.gain.setValueAtTime(tk.name==='Reggae Vibes'?0.04:0.06,dt);
          sG2.gain.exponentialRampToValueAtTime(0.001,dt+0.1);
          sSrc.connect(sG2);sG2.connect(masterG);
          sSrc.start(dt);
        }
      }
    }
    
    // ═══ HI-HAT ═══
    if(tk.hat){
      var hatSteps=tk.name==='Drum & Bass'?8:tk.name==='Tropical House'?8:4;
      var hatBeat=barLen/hatSteps;
      for(var hi=0;hi<hatSteps;hi++){
        var ht=startTime+hi*hatBeat;
        var hLen=256;var hBuf=actx.createBuffer(1,hLen,actx.sampleRate);
        var hData=hBuf.getChannelData(0);
        for(var hh=0;hh<hLen;hh++)hData[hh]=(Math.random()*2-1)*Math.pow(1-hh/hLen,6);
        var hSrc=actx.createBufferSource();hSrc.buffer=hBuf;
        var hG=actx.createGain();
        var hVol=(hi%2===0)?0.03:0.015;
        hG.gain.setValueAtTime(hVol,ht);
        hG.gain.exponentialRampToValueAtTime(0.001,ht+0.05);
        var hFilt=actx.createBiquadFilter();hFilt.type='highpass';hFilt.frequency.value=7000;
        hSrc.connect(hFilt);hFilt.connect(hG);hG.connect(masterG);
        hSrc.start(ht);
      }
    }
  }
  
  // Schedule 8 bars, then loop
  function schedLoop(){
    if(!actx)return;
    var now=actx.currentTime+0.05;
    for(var bar=0;bar<8;bar++){
      playBar(now+bar*barLen,bar);
    }
    mTO=setTimeout(schedLoop,(8*barLen*1000)-200);
  }
  schedLoop();
  
  // Show track name
  var mb=document.getElementById("mb");
  if(mb)mb.title=tk.name;

// Timezone: store reference UTC offset for each GP
// CET=+1, CEST=+2 (European summer time March-Oct)
// GPs 1-3: CET (+1), GPs 4-22: CEST (+2) except 18-22 back to CET (+1)
var GP_UTC_OFFSET={1:1,2:1,3:2,4:2,5:2,6:2,7:2,8:2,9:2,10:2,11:2,12:2,13:2,14:2,15:2,16:2,17:2,18:1,19:1,20:1,21:1,22:1};

function convertTime(timeStr, gpId){
  // timeStr is "HH:MM" in French time (CET/CEST)
  // Convert to local timezone
  var parts=timeStr.split(':');
  var h=parseInt(parts[0]),m=parseInt(parts[1]||0);
  // French UTC offset for this GP
  var frOffset=GP_UTC_OFFSET[gpId]||1;
  // Create a UTC date
  var utcH=h-frOffset;
  // Get local offset in hours
  var localOffset=-new Date().getTimezoneOffset()/60;
  // Convert to local
  var localH=utcH+localOffset;
  // Normalize
  while(localH<0)localH+=24;
  while(localH>=24)localH-=24;
  return String(Math.floor(localH)).padStart(2,'0')+':'+String(m).padStart(2,'0');
}

function getTimezoneLabel(){
  try{return Intl.DateTimeFormat().resolvedOptions().timeZone.split('/').pop().replace(/_/g,' ')}catch(e){return 'locale'}
}

function hashPw(pw){var h=0;for(var i=0;i<pw.length;i++){h=((h<<5)-h)+pw.charCodeAt(i);h|=0}return Math.abs(h).toString(36)}

function doLogin(){
  var nm=(document.getElementById("iNm").value||"").trim();
  var pw=document.getElementById("iPw").value||"";
  var err=document.getElementById("loginErr");
  err.style.display="none";
  if(!nm){err.style.display="block";err.textContent="Entre ton pseudo";return}
  if(!pw){err.style.display="block";err.textContent="Entre ton mot de passe";return}
  var existing=S.p.find(function(p){return p.nm.toLowerCase()===nm.toLowerCase()});
  if(!existing){err.style.display="block";err.textContent="❌ Pseudo inconnu — inscris-toi d'abord";return}

  h+='<div style="display:flex;gap:4px"><select id="addFriendSel" style="flex:1;padding:8px;background:var(--c3);border:1px solid var(--bd);border-radius:6px;color:#fff;font-size:11px;cursor:pointer!important;-webkit-user-select:text!important;user-select:text!important;caret-color:var(--yel)!important">';
  S.p.forEach(function(pl){
    if(pl.ph!==S.u&&(p.friends||[]).indexOf(pl.ph)<0){
      h+='<option value="'+pl.ph+'">'+(pl.av||"👤")+' '+pl.nm+'</option>';
    }
  });
  h+='</select><button class="bt by" style="width:auto;padding:8px 16px" onclick="addFriend()">AJOUTER</button></div></div>';
  
  // Friends list
  h+='<div style="font-family:var(--ff);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--t3);margin-bottom:6px">MES AMIS ('+(p.friends||[]).length+')</div>';
  
  if(!p.friends||!p.friends.length){
    h+='<div class="cd" style="text-align:center;padding:20px;color:var(--t3);font-size:11px">Aucun ami pour le moment.<br>Ajoute des joueurs ci-dessus !</div>';
  } else {
    p.friends.forEach(function(fph){
      var friend=S.p.find(function(x){return x.ph===fph});
      if(!friend)return;
      var lv=gl(friend.xp||0);
      // Count unread messages
      var dmKey=getDmKey(S.u,fph);
      var msgs=(S.pm[dmKey]||[]);
      var lastRead=S.pm['read_'+dmKey]||0;
      var unread=0;
      msgs.forEach(function(m){if(m.t>lastRead&&m.f!==p.nm)unread++});
      
      h+='<div class="cd" style="padding:10px 12px;cursor:pointer!important;display:flex;justify-content:space-between;align-items:center" onclick="openDm(\''+fph+'\')">';
      h+='<div style="display:flex;align-items:center;gap:8px"><span style="font-size:20px">'+(friend.av||"👤")+'</span><div><div style="font-size:12px;font-weight:900;color:#fff">'+friend.nm+'</div><div style="font-size:8px;color:var(--t3)">'+lv.i+' Niv.'+lv.l+' • '+( friend.tp||0)+' pts</div></div></div>';
      h+='<div style="display:flex;align-items:center;gap:6px">';
      if(unread>0)h+='<span style="background:var(--red);color:#fff;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900">'+unread+'</span>';
      h+='<span style="font-size:16px;color:var(--yel)">💬</span>';
      h+='<button onclick="event.stopPropagation();removeFriend(\''+fph+'\')" style="background:none;border:none;font-size:12px;cursor:pointer!important;color:var(--red)">✕</button>';
      h+='</div></div>';
    });
  }
  
  document.getElementById("p-friends").innerHTML=h;
}

function getDmKey(a,b){return [a,b].sort().join('_')}

function addFriend(){
  var sel=document.getElementById('addFriendSel');
  if(!sel||!sel.value)return;
  var p=me();if(!p)return;
  if(!p.friends)p.friends=[];
  if(p.friends.indexOf(sel.value)>=0)return;
  p.friends.push(sel.value);
  // Also add reverse friendship
  var friend=S.p.find(function(x){return x.ph===sel.value});
  if(friend){
    if(!friend.friends)friend.friends=[];
    if(friend.friends.indexOf(S.u)<0)friend.friends.push(S.u);
  }
  sv();rFr(p);
}

function removeFriend(fph){
  var p=me();if(!p)return;
  if(!confirm('Retirer cet ami ?'))return;
  p.friends=(p.friends||[]).filter(function(x){return x!==fph});
  sv();rFr(p);
}

function openDm(fph){
  window._dmTarget=fph;
  nav('dm');
}

function rDm(p){
  var fph=window._dmTarget;
  if(!fph){nav('friends');return}
  var friend=S.p.find(function(x){return x.ph===fph});
  if(!friend){nav('friends');return}
  var dmKey=getDmKey(S.u,fph);
  
  // Mark as read

function listenFirebase(){

      }
    });
    if(updated)ren();

  db.ref("gp/"+live.id+"/feed").on("value",function(snap){

// ── ANTHROPIC API: Recherche automatique des résultats ──
var lastFetch=0;
var fetchInterval=180000; // 3 minutes
var isFetching=false;

async function fetchLiveResults(){
  var live=G.find(function(g){return g.st==="live"});
  if(!live||!live.sessData)return;
  if(isFetching)return;
  
  var now=new Date();
  var needsUpdate=false;
  live.sessData.forEach(function(s){
    var end=new Date(s.end);
    if(now>=end&&!s.res)needsUpdate=true;
  });
  if(!needsUpdate)return;
  
  isFetching=true;
  var el=document.getElementById('fetch-status');
  if(el)el.innerHTML='<span style="color:var(--yel);font-size:8px;animation:pulse 1s infinite">🔄 Recherche résultats...</span>';
  
  try{
    var sessInfo=live.sessData.map(function(s,i){
      var end=new Date(s.end);
      return s.name+"(idx:"+i+","+(now>=end?(s.res?"has_data":"NEED"):"upcoming")+")";
    }).join(", ");
    
    var prompt="Give me the latest confirmed MotoGP results from the 2026 Brazilian GP at Goiania (March 20-22 2026). "
    +"Sessions status: "+sessInfo+". "
    +"For each session marked NEED, give full classification with lap times. "
    +"Reply ONLY with valid JSON, no markdown: "
    +'{"sessions":[{"idx":2,"name":"FP2","results":[{"rider":"Marquez","time":"1:18.234"},{"rider":"Martin","time":"1:18.301"}]},{"idx":3,"name":"Q1","results":[...]}]}';
    
    var resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:3000,
        messages:[{role:"user",content:prompt}],
        tools:[{type:"web_search_20250305",name:"web_search"}]
      })
    });
    
    var data=await resp.json();
    if(!data||!data.content)throw new Error("No content");
    
    var fullText=data.content.map(function(item){return item.type==="text"?item.text:""}).filter(Boolean).join("\n");
    var clean=fullText.replace(/```json|```/g,"").trim();
    var j1=clean.indexOf("{"),j2=clean.lastIndexOf("}")+1;
    if(j1<0)throw new Error("No JSON");
    var parsed=JSON.parse(clean.substring(j1,j2));
    if(!parsed.sessions)throw new Error("No sessions");
    
    var updated=false;
    parsed.sessions.forEach(function(sess){
      if(!sess.results||!sess.results.length)return;
      var idx=sess.idx;
      if(idx===undefined||!live.sessData[idx]||live.sessData[idx].res)return;
      
      var newRes=[];
      sess.results.forEach(function(r){
        var name=(r.rider||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
        var rd=R.find(function(x){
          var xn=x.n.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
          return xn.indexOf(name)>=0||name.indexOf(xn.split(" ").pop())>=0;
        });
        if(rd)newRes.push({rid:rd.id,t:r.time||""});
      });
      
      if(newRes.length>=3){
        live.sessData[idx].res=newRes;
        updated=true;
        // Push to Firebase so all users see it
        if(firebaseReady&&db){
          db.ref("gp/"+live.id+"/sessions/"+idx).set({res:newRes,updated:Date.now()});
        }
        console.log("✅ "+sess.name+": "+newRes.length+" résultats");
      }
    });
    
    if(updated){
      if(el)el.innerHTML='<span style="color:var(--grn);font-size:8px">✅ Résultats mis à jour!</span>';
      ren();
    }else{
      if(el)el.innerHTML='<span style="color:var(--t3);font-size:8px">Pas de nouveaux résultats</span>';
    }
  }catch(err){
    console.log("Fetch error:",err);
    if(el)el.innerHTML='<span style="color:var(--t3);font-size:8px">⏳ Réessai dans 3min</span>';
  }
  isFetching=false;
  lastFetch=Date.now();
}
